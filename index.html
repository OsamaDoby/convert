<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeDown - Pro Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.95);
            --text-color: #f8fafc;
            --input-bg: rgba(30, 41, 59, 0.7);
            --primary-neon: #00f2ff;
            --secondary-neon: #7000ff;
            --border-color: rgba(0, 242, 255, 0.2);
            --glow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.98);
            --text-color: #1e293b;
            --input-bg: #f1f5f9;
            --primary-neon: #0ea5e9;
            --secondary-neon: #6366f1;
            --border-color: #e2e8f0;
            --glow: 0 0 10px rgba(14, 165, 233, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Cairo', 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%; max-width: 450px; padding: 2.5rem 2rem;
            background: var(--card-bg); backdrop-filter: blur(15px);
            border-radius: 30px; border: 2px solid var(--border-color);
            box-shadow: var(--glow); margin-bottom: 25px; text-align: center;
        }

        .btn-tool {
            background: var(--input-bg); border: 1px solid var(--border-color);
            color: var(--text-color); padding: 8px 14px; border-radius: 10px;
            cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 0.9rem;
        }

        .logo-main {
            font-size: 2.5rem; font-weight: 800; color: var(--primary-neon);
            text-shadow: 0 0 15px var(--primary-neon); margin-bottom: 5px;
        }

        .tagline { opacity: 0.7; font-size: 0.9rem; margin-bottom: 2rem; }

        input {
            width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border-color);
            background: var(--input-bg); color: var(--text-color); outline: none;
            font-size: 1rem; text-align: center; margin-bottom: 1rem;
        }
        input:focus { border-color: var(--primary-neon); box-shadow: 0 0 15px var(--primary-neon); }

        .action-btn {
            width: 100%; background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            color: white; padding: 18px; border-radius: 15px; font-weight: 800; border: none;
            cursor: pointer; font-family: 'Cairo'; font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px var(--primary-neon); }

        #resultBox {
            display: none; margin-top: 2rem; padding: 20px;
            background: rgba(0,0,0,0.3); border-radius: 20px; border: 1px solid var(--border-color);
        }

        .dl-card {
            background: var(--input-bg); border: 1px solid var(--border-color);
            padding: 15px; border-radius: 15px; margin-bottom: 10px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .dl-link {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px; border-radius: 12px;
            text-decoration: none; font-weight: bold; font-size: 1rem;
        }
        .link-audio { background: #10b981; color: white; }
        .link-video { background: #6366f1; color: white; }
        .dl-link:hover { opacity: 0.9; transform: scale(1.02); }

        .loading { display: none; margin: 20px 0; color: var(--primary-neon); }
        .loading i { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .dev-signature { font-family: 'Poppins'; font-size: 0.9rem; margin-bottom: 20px; }
        .dev-signature span { color: var(--primary-neon); font-weight: 800; }

        .social-footer { display: flex; gap: 15px; margin-bottom: 30px; }
        .social-icon { 
            width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; color: white; text-decoration: none; font-size: 1.4rem; 
            background: var(--input-bg); border: 1px solid var(--border-color);
        }
        .social-icon:hover { transform: translateY(-5px); border-color: var(--primary-neon); box-shadow: 0 5px 15px rgba(0,242,255,0.2); }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
        <button class="btn-tool" onclick="toggleLang()" id="langBtn"><i class="fas fa-language"></i> EN</button>
        <button class="btn-tool" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>

    <div class="logo-main">VibeDown</div>
    <div class="tagline" id="tagline">أسرع تحويل بجودة 320kbps</div>

    <input type="text" id="videoUrl" placeholder="انسخ رابط اليوتيوب هنا...">
    <button class="action-btn" onclick="handleConvert()" id="btnConvert">تحميل الآن</button>

    <div class="loading" id="loader">
        <i class="fas fa-spinner fa-3x"></i>
        <p id="loadText">جاري تجهيز الروابط...</p>
    </div>

    <div id="resultBox">
        <div class="dl-card">
            <span id="txtAudio" style="font-weight: bold; color: #10b981;">MP3 - 320kbps</span>
            <div id="audioArea"></div>
        </div>
        <div class="dl-card">
            <span id="txtVideo" style="font-weight: bold; color: #6366f1;">MP4 - Full HD</span>
            <div id="videoArea"></div>
        </div>
    </div>
</div>

<div class="dev-signature">Developed by <span>Osama</span></div>

<div class="social-footer">
    <a href="https://wa.me/message/FJEGUNCJ4JX7P1" class="social-icon" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/osamamasrawy?igsh=MWJqcnhhMWd6MjNxNQ%3D%3D" class="social-icon" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://www.facebook.com/share/18TtS2GVNi/" class="social-icon" target="_blank"><i class="fab fa-facebook-f"></i></a>
</div>

<script>
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '☀️' : '🌙';
    }

    function toggleLang() {
        const isAr = document.documentElement.getAttribute('lang') === 'ar';
        const newLang = isAr ? 'en' : 'ar';
        document.documentElement.setAttribute('lang', newLang);
        document.documentElement.setAttribute('dir', isAr ? 'ltr' : 'rtl');
        document.getElementById('langBtn').innerHTML = isAr ? '<i class="fas fa-language"></i> AR' : '<i class="fas fa-language"></i> EN';
        
        const t = {
            ar: { tag: "أسرع تحويل بجودة 320kbps", placeholder: "انسخ رابط اليوتيوب هنا...", btn: "تحميل الآن", load: "جاري تجهيز الروابط..." },
            en: { tag: "Fastest 320kbps Converter", placeholder: "Paste YouTube link here...", btn: "Download Now", load: "Preparing Links..." }
        }[newLang];

        document.getElementById('tagline').innerText = t.tag;
        document.getElementById('videoUrl').placeholder = t.placeholder;
        document.getElementById('btnConvert').innerText = t.btn;
        document.getElementById('loadText').innerText = t.load;
    }

    function extractID(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(reg);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function handleConvert() {
        const url = document.getElementById('videoUrl').value;
        const id = extractID(url);
        if (!id) { alert("Invalid URL!"); return; }

        const loader = document.getElementById('loader');
        const resBox = document.getElementById('resultBox');
        
        loader.style.display = 'block';
        resBox.style.display = 'none';

        // استخدام محرك تحويل مباشر يدعم الجودات العالية
        const audioUrl = `https://api.deemix.biz/download?id=${id}&type=mp3&q=320`; // مثال لمحرك جودة عالية
        const videoUrl = `https://www.y2mate.com/youtube/${id}`; // يوجه المستخدم لخيارات الجودة مباشرة

        setTimeout(() => {
            loader.style.display = 'none';
            resBox.style.display = 'block';
            
            document.getElementById('audioArea').innerHTML = `
                <a href="https://loader.to/api/button/?url=${url}&f=mp3&color=10b981" target="_blank" class="dl-link link-audio">
                    <i class="fas fa-music"></i> Download 320kbps MP3
                </a>`;
            
            document.getElementById('videoArea').innerHTML = `
                <a href="https://loader.to/api/button/?url=${url}&f=1080&color=6366f1" target="_blank" class="dl-link link-video">
                    <i class="fas fa-video"></i> Download MP4 (Up to 4K)
                </a>`;
        }, 1500);
    }
</script>
</body>
</html>
