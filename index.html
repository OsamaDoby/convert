<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeDown - Media Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.95);
            --text-color: #f8fafc;
            --input-bg: rgba(30, 41, 59, 0.7);
            --primary-neon: #00f2ff;
            --secondary-neon: #7000ff;
            --border-color: rgba(0, 242, 255, 0.2);
            --glow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.98);
            --text-color: #1e293b;
            --input-bg: #f1f5f9;
            --primary-neon: #0ea5e9;
            --secondary-neon: #6366f1;
            --border-color: #e2e8f0;
            --glow: 0 0 10px rgba(14, 165, 233, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Cairo', 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 2.5rem 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 2px solid var(--border-color);
            box-shadow: var(--glow);
            margin-bottom: 25px;
            text-align: center;
        }

        .btn-tool {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            font-size: 0.9rem;
        }
        .btn-tool:hover { transform: translateY(-2px); border-color: var(--primary-neon); }

        .logo-main {
            font-size: 2.2rem; font-weight: 800; color: var(--primary-neon);
            animation: neon-glow-soft 2s infinite alternate; letter-spacing: 1px;
            margin-bottom: 5px;
        }
        @keyframes neon-glow-soft {
            from { text-shadow: 0 0 5px var(--primary-neon); }
            to { text-shadow: 0 0 15px var(--primary-neon); }
        }

        .tagline { opacity: 0.6; font-size: 0.85rem; margin-bottom: 2rem; }

        .input-group { text-align: right; margin-bottom: 1.5rem; }
        [dir="ltr"] .input-group { text-align: left; }

        input {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--border-color);
            background: var(--input-bg); color: var(--text-color); outline: none; font-size: 1rem;
            text-align: center;
        }
        input:focus { border-color: var(--primary-neon); box-shadow: 0 0 10px var(--primary-neon); }

        .action-btn {
            width: 100%; background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            color: white; padding: 16px; border-radius: 15px; font-weight: bold; border: none;
            cursor: pointer; margin-top: 10px; font-family: 'Cairo'; font-size: 1.1rem;
        }
        .action-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--primary-neon); }

        /* منطقة النتائج */
        #resultBox {
            display: none; margin-top: 2rem; padding: 20px;
            background: rgba(0,0,0,0.2); border-radius: 20px; border: 1px solid var(--border-color);
        }

        .dl-link {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px;
            text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .link-audio { color: var(--primary-neon); border: 1px solid var(--primary-neon); }
        .link-audio:hover { background: var(--primary-neon); color: black; }
        .link-video { color: var(--secondary-neon); border: 1px solid var(--secondary-neon); }
        .link-video:hover { background: var(--secondary-neon); color: white; }

        .loading { display: none; margin: 20px 0; color: var(--primary-neon); }

        .dev-signature { font-family: 'Poppins'; font-size: 0.9rem; margin-bottom: 20px; }
        .dev-signature span { color: var(--primary-neon); font-weight: 800; text-shadow: 0 0 5px var(--primary-neon); }

        .social-footer { display: flex; gap: 15px; margin-bottom: 30px; }
        .social-icon { 
            width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; color: white; text-decoration: none; font-size: 1.3rem; 
            background: var(--input-bg); border: 1px solid var(--border-color);
        }
        .social-icon:hover { transform: translateY(-5px); border-color: var(--primary-neon); }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
        <button class="btn-tool" onclick="toggleLang()" id="langBtn"><i class="fas fa-language"></i> EN</button>
        <button class="btn-tool" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>

    <div class="logo-main">VibeDown</div>
    <div class="tagline" id="tagline">حول وحمل فيديوهاتك بأعلى جودة</div>

    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="ضع رابط الفيديو هنا...">
    </div>

    <button class="action-btn" onclick="handleConvert()" id="btnConvert">ابدأ التحويل</button>

    <div class="loading" id="loader">
        <i class="fas fa-compact-disc fa-spin fa-2x"></i>
    </div>

    <div id="resultBox">
        <h4 id="resTitle" style="margin-top:0">روابط التحميل جاهزة</h4>
        <div id="linksContainer"></div>
    </div>
</div>

<div class="dev-signature">Developed by <span>Osama</span></div>

<div class="social-footer">
    <a href="https://wa.me/message/FJEGUNCJ4JX7P1" class="social-icon" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/osamamasrawy?igsh=MWJqcnhhMWd6MjNxNQ%3D%3D" class="social-icon" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://www.facebook.com/share/18TtS2GVNi/" class="social-icon" target="_blank"><i class="fab fa-facebook-f"></i></a>
</div>

<script>
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '☀️' : '🌙';
    }

    function toggleLang() {
        const isAr = document.documentElement.getAttribute('lang') === 'ar';
        const newLang = isAr ? 'en' : 'ar';
        document.documentElement.setAttribute('lang', newLang);
        document.documentElement.setAttribute('dir', isAr ? 'ltr' : 'rtl');
        document.getElementById('langBtn').innerHTML = isAr ? '<i class="fas fa-language"></i> AR' : '<i class="fas fa-language"></i> EN';
        
        const t = {
            ar: { tag: "حول وحمل فيديوهاتك بأعلى جودة", placeholder: "ضع رابط الفيديو هنا...", btn: "ابدأ التحويل", res: "روابط التحميل جاهزة" },
            en: { tag: "Convert & Download Media Easily", placeholder: "Paste video link here...", btn: "Start Conversion", res: "Download Links Ready" }
        }[newLang];

        document.getElementById('tagline').innerText = t.tag;
        document.getElementById('videoUrl').placeholder = t.placeholder;
        document.getElementById('btnConvert').innerText = t.btn;
        document.getElementById('resTitle').innerText = t.res;
    }

    function extractID(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(reg);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function handleConvert() {
        const url = document.getElementById('videoUrl').value;
        const id = extractID(url);
        const isAr = document.documentElement.getAttribute('lang') === 'ar';

        if (!id) {
            alert(isAr ? "عفواً، الرابط غير صحيح!" : "Invalid YouTube URL!");
            return;
        }

        document.getElementById('loader').style.display = 'block';
        document.getElementById('resultBox').style.display = 'none';

        // محاكاة سريعة للجلب ثم إظهار الأزرار
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('resultBox').style.display = 'block';
            
            document.getElementById('linksContainer').innerHTML = `
                <a href="https://api.vevioz.com/api/button/mp3/${id}" target="_blank" class="dl-link link-audio">
                    <i class="fas fa-music"></i> ${isAr ? 'تحميل ملف صوت MP3' : 'Download MP3 Audio'}
                </a>
                <a href="https://api.vevioz.com/api/button/videos/${id}" target="_blank" class="dl-link link-video">
                    <i class="fas fa-video"></i> ${isAr ? 'تحميل فيديو MP4 بجودات متعددة' : 'Download MP4 Video Qualities'}
                </a>
            `;
        }, 1200);
    }
</script>
</body>
</html>
