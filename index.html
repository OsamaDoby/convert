<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeDown - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --text: #f8fafc;
            --neon: #00f2ff; --neon2: #7000ff; --border: rgba(0, 242, 255, 0.2);
        }
        [data-theme="light"] {
            --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
            --neon: #0ea5e9; --neon2: #6366f1; --border: #e2e8f0;
        }
        body {
            font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;
        }
        .container {
            width: 100%; max-width: 450px; background: var(--card); padding: 2.5rem;
            border-radius: 35px; border: 2px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center; position: relative;
        }
        /* حل نهائي لتداخل الأزرار */
        .top-bar {
            display: flex; justify-content: space-between; width: 100%; margin-bottom: 25px;
        }
        .btn-tool {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text);
            padding: 10px 18px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;
        }
        .logo { font-size: 3rem; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin: 0; }
        .tagline { opacity: 0.6; font-size: 0.9rem; margin-bottom: 35px; }
        
        input {
            width: 100%; padding: 18px; border-radius: 15px; border: 2px solid var(--border);
            background: rgba(0,0,0,0.2); color: var(--text); outline: none; text-align: center; font-size: 1rem; margin-bottom: 20px;
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }
        
        .main-btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, var(--neon), var(--neon2));
            color: white; font-weight: 900; font-size: 1.2rem; cursor: pointer;
        }
        .main-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px var(--neon); }

        .social { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        .social a { 
            width: 45px; height: 45px; border-radius: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.3rem;
        }
        .social a:hover { border-color: var(--neon); transform: translateY(-5px); }
        .sig { margin-top: 25px; font-size: 0.9rem; opacity: 0.5; }
        .sig span { color: var(--neon); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <button class="btn-tool" onclick="toggleLang()" id="langBtn"><i class="fas fa-language"></i> EN</button>
        <button class="btn-tool" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
    </div>

    <h1 class="logo">VibeDown</h1>
    <p class="tagline" id="tag">تحميل سريع بجودة أصلية</p>

    <input type="text" id="urlInput" placeholder="ضع رابط اليوتيوب هنا...">
    <button class="main-btn" onclick="goDownload()" id="btnText">تحميل الآن</button>

    <div class="sig">Developed by <span>Osama</span></div>

    <div class="social">
        <a href="https://wa.me/message/FJEGUNCJ4JX7P1" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.instagram.com/osamamasrawy" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/share/18TtS2GVNi/" target="_blank"><i class="fab fa-facebook-f"></i></a>
    </div>
</div>

<script>
    function toggleTheme() {
        const d = document.documentElement;
        const isDark = d.getAttribute('data-theme') !== 'light';
        d.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeBtn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    function toggleLang() {
        const isAr = document.documentElement.getAttribute('lang') !== 'en';
        document.documentElement.setAttribute('lang', isAr ? 'en' : 'ar');
        document.documentElement.setAttribute('dir', isAr ? 'ltr' : 'rtl');
        document.getElementById('langBtn').innerHTML = isAr ? '<i class="fas fa-language"></i> AR' : '<i class="fas fa-language"></i> EN';
        document.getElementById('tag').innerText = isAr ? "Fast & Original Quality Download" : "تحميل سريع بجودة أصلية";
        document.getElementById('urlInput').placeholder = isAr ? "Paste link here..." : "ضع رابط اليوتيوب هنا...";
        document.getElementById('btnText').innerText = isAr ? "Download Now" : "تحميل الآن";
    }

    function goDownload() {
        const url = document.getElementById('urlInput').value;
        if(!url) { alert("من فضلك ضع الرابط!"); return; }

        // استخدام "خدعة" التحويل المباشر لمحرك yt1s اللي أنت اقترحته
        // هفتح لك اللينك بطريقة تخليه يقرأ الفيديو فوراً
        const cleanUrl = url.split('&')[0]; // تنظيف اللينك
        const finalUrl = `https://www.google.com/search?q=site:yt1s.com+${encodeURIComponent(cleanUrl)}`;
        
        // الطريقة الأضمن 100% لفتح صفحة التحميل للفيديو بتاعك:
        const targetUrl = `https://www.y2mate.com/youtube/${extractID(url)}`;
        window.open(targetUrl, '_blank');
    }

    function extractID(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(reg);
        return (match && match[2].length === 11) ? match[2] : "";
    }
</script>
</body>
</html>
