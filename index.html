<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeDown - Pro Media Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.95);
            --text-color: #f8fafc;
            --input-bg: rgba(30, 41, 59, 0.7);
            --primary-neon: #00f2ff;
            --secondary-neon: #7000ff;
            --border-color: rgba(0, 242, 255, 0.2);
            --glow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --input-bg: #f8fafc;
            --primary-neon: #0ea5e9;
            --secondary-neon: #6366f1;
            --border-color: #e2e8f0;
            --glow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
        }

        .container {
            width: 100%; max-width: 480px; padding: 2rem;
            background: var(--card-bg); border-radius: 35px;
            border: 2px solid var(--border-color); box-shadow: var(--glow);
            text-align: center;
        }

        /* إصلاح تداخل الأزرار */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;
        }

        .btn-tool {
            background: var(--input-bg); border: 1px solid var(--border-color);
            color: var(--text-color); padding: 8px 15px; border-radius: 12px;
            cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
        }

        .logo-main {
            font-size: 2.5rem; font-weight: 800; color: var(--primary-neon);
            text-shadow: 0 0 10px var(--primary-neon); margin-bottom: 5px;
        }

        .tagline { opacity: 0.7; font-size: 0.9rem; margin-bottom: 2rem; }

        .input-box {
            width: 100%; padding: 18px; border-radius: 18px; border: 2px solid var(--border-color);
            background: var(--input-bg); color: var(--text-color); outline: none;
            font-size: 1rem; text-align: center; margin-bottom: 1rem;
        }

        .btn-main {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            color: white; font-weight: 800; font-size: 1.1rem; cursor: pointer;
        }

        #optionsBox { display: none; margin-top: 2rem; }

        .option-card {
            background: rgba(0,0,0,0.2); border: 1px solid var(--border-color);
            padding: 20px; border-radius: 20px; margin-bottom: 15px;
        }

        .dl-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px; border-radius: 12px; margin-top: 10px;
            text-decoration: none; font-weight: bold; color: white;
        }

        .loader { display: none; margin: 20px auto; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary-neon); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .social { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        .social a { 
            width: 45px; height: 45px; border-radius: 12px; background: var(--input-bg);
            border: 1px solid var(--border-color); color: white; display: flex;
            align-items: center; justify-content: center; text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <button class="btn-tool" onclick="toggleLang()" id="langBtn"><i class="fas fa-language"></i> EN</button>
        <button class="btn-tool" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
    </div>

    <div class="logo-main">VibeDown</div>
    <div class="tagline" id="tagline">تحميل مباشر وسريع بجودة أصلية</div>

    <input type="text" id="videoUrl" class="input-box" placeholder="ضع رابط الفيديو هنا...">
    <button class="btn-main" onclick="processVideo()" id="btnStart">تحميل</button>

    <div class="loader" id="loader"></div>

    <div id="optionsBox">
        <div class="option-card">
            <h4 style="margin:0 0 10px 0; color: #10b981;">🎧 MP3 - 320kbps</h4>
            <button onclick="download('mp3')" class="dl-btn" style="background: #10b981; border:none; cursor:pointer; width:100%">
                <i class="fas fa-music"></i> <span id="txtAud">تحميل الصوت الآن</span>
            </button>
        </div>

        <div class="option-card">
            <h4 style="margin:0 0 10px 0; color: #6366f1;">🎬 MP4 - Video</h4>
            <select id="videoQual" class="input-box" style="margin-bottom: 10px; padding: 10px;">
                <option value="1080">1080p Full HD</option>
                <option value="720">720p HD</option>
                <option value="480">480p SD</option>
            </select>
            <button onclick="download('video')" class="dl-btn" style="background: #6366f1; border:none; cursor:pointer; width:100%">
                <i class="fas fa-video"></i> <span id="txtVid">تحميل الفيديو</span>
            </button>
        </div>
    </div>
</div>

<div class="social">
    <a href="https://wa.me/message/FJEGUNCJ4JX7P1" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/osamamasrawy" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://www.facebook.com/share/18TtS2GVNi/" target="_blank"><i class="fab fa-facebook-f"></i></a>
</div>

<script>
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerHTML = next === 'light' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    function toggleLang() {
        const isAr = document.documentElement.getAttribute('lang') === 'ar';
        const newLang = isAr ? 'en' : 'ar';
        document.documentElement.setAttribute('lang', newLang);
        document.documentElement.setAttribute('dir', isAr ? 'ltr' : 'rtl');
        document.getElementById('langBtn').innerHTML = isAr ? '<i class="fas fa-language"></i> AR' : '<i class="fas fa-language"></i> EN';
        
        document.getElementById('tagline').innerText = isAr ? "Direct & Fast Original Quality Download" : "تحميل مباشر وسريع بجودة أصلية";
        document.getElementById('videoUrl').placeholder = isAr ? "Paste video link here..." : "ضع رابط الفيديو هنا...";
        document.getElementById('btnStart').innerText = isAr ? "Download" : "تحميل";
        document.getElementById('txtAud').innerText = isAr ? "Download Audio Now" : "تحميل الصوت الآن";
        document.getElementById('txtVid').innerText = isAr ? "Download Video" : "تحميل الفيديو";
    }

    function extractID(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(reg);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function processVideo() {
        const url = document.getElementById('videoUrl').value;
        if(!extractID(url)) { alert("رابط غير صحيح"); return; }
        
        document.getElementById('loader').style.display = 'block';
        document.getElementById('optionsBox').style.display = 'none';

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('optionsBox').style.display = 'block';
        }, 1000);
    }

    function download(type) {
        const url = document.getElementById('videoUrl').value;
        const id = extractID(url);
        const qual = document.getElementById('videoQual').value;
        
        if(type === 'mp3') {
            // استخدام رابط مباشر لمحرك التحميل
            window.open(`https://api.vevioz.com/api/button/mp3/${id}`, '_blank');
        } else {
            // استخدام محرك يدعم اختيار الجودة
            window.open(`https://api.vevioz.com/api/button/videos/${id}`, '_blank');
        }
    }
</script>
</body>
</html>
