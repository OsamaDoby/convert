<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman Downloader - محمل فيديوهات أمان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0f172a;
            --primary-neon: #00f2ff;
            --secondary-neon: #7000ff;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-light: #f8fafc;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top, #1e293b, var(--bg-deep));
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .hero-section {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 40px;
        }

        .hero-section h1 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .main-card {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 18px 25px;
            border-radius: 15px;
            border: 2px solid transparent;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-neon);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .btn-fetch {
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            border: none;
            color: white;
            padding: 0 30px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-fetch:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary-neon);
        }

        /* الجزء الخاص بالاختيارات (يظهر بعد وضع اللينك) */
        .download-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .option-group {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .option-group h3 {
            margin-top: 0;
            font-size: 1rem;
            color: var(--primary-neon);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
            margin-top: 10px;
        }

        .btn-download {
            grid-column: span 2;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--primary-neon);
            background: transparent;
            color: var(--primary-neon);
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-download:hover {
            background: var(--primary-neon);
            color: black;
        }

        .footer {
            margin-top: auto;
            padding: 40px;
            opacity: 0.6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1>Aman Media Converter</h1>
        <p>حول وحمل فيديوهاتك المفضلة بأعلى جودة</p>
    </div>

    <div class="main-card">
        <div class="input-wrapper">
            <input type="text" id="videoUrl" placeholder="ضع رابط اليوتيوب هنا...">
            <button class="btn-fetch" onclick="processUrl()">ابدأ</button>
        </div>

        <div id="loading" style="display: none; text-align: center; margin: 20px;">
            <i class="fas fa-spinner fa-spin fa-2x"></i> جاري فحص الرابط...
        </div>

        <div class="download-options" id="optionsArea">
            <div class="option-group">
                <h3><i class="fas fa-music"></i> تحميل كـ MP3</h3>
                <select id="audioQuality">
                    <option value="320">جودة عالية (320kbps)</option>
                    <option value="192">جودة متوسطة (192kbps)</option>
                    <option value="128">جودة عادية (128kbps)</option>
                </select>
            </div>

            <div class="option-group">
                <h3><i class="fas fa-video"></i> تحميل كـ MP4</h3>
                <select id="videoQuality">
                    <option value="1080">Full HD (1080p)</option>
                    <option value="720">HD (720p)</option>
                    <option value="480">SD (480p)</option>
                    <option value="360">عادي (360p)</option>
                </select>
            </div>

            <button class="btn-download" onclick="startDownload()">
                <i class="fas fa-download"></i> تأكيد التحميل
            </button>
        </div>
    </div>

    <div class="footer">
        Developed by Osama &copy; 2026
    </div>

    <script>
        function processUrl() {
            const url = document.getElementById('videoUrl').value;
            if(!url) { alert("من فضلك ضع رابط أولاً"); return; }
            
            // محاكاة عملية الفحص
            document.getElementById('loading').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                alert("تم التعرف على الفيديو! اختر الجودة المناسبة واضغط تحميل.");
            }, 1500);
        }

        function startDownload() {
            alert("هذه النسخة للتصميم فقط. لتشغيل التحميل الفعلي، نحتاج لربطها بسيرفر (API).");
        }
    </script>
</body>
</html>
