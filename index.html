<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeDown - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617; --card: #0f172a; --text: #f8fafc;
            --neon: #00f2ff; --neon2: #7000ff; --border: rgba(0, 242, 255, 0.2);
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --card: #ffffff; --text: #1e293b;
            --neon: #0ea5e9; --neon2: #6366f1; --border: #e2e8f0;
        }
        body {
            font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
        }
        .container {
            width: 100%; max-width: 450px; background: var(--card); padding: 2rem;
            border-radius: 30px; border: 2px solid var(--border); box-shadow: 0 0 20px rgba(0,242,255,0.1);
            text-align: center;
        }
        .top-btns { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .btn-small {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text);
            padding: 8px 15px; border-radius: 12px; cursor: pointer; font-size: 0.8rem;
        }
        .logo { font-size: 2.8rem; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); margin: 0; }
        .tagline { opacity: 0.6; font-size: 0.85rem; margin-bottom: 30px; }
        
        .input-area { margin-bottom: 20px; }
        input {
            width: 100%; padding: 18px; border-radius: 15px; border: 2px solid var(--border);
            background: rgba(0,0,0,0.2); color: var(--text); outline: none; text-align: center; font-size: 1rem;
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }
        
        .main-btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, var(--neon), var(--neon2));
            color: white; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }
        .main-btn:hover { transform: scale(1.03); box-shadow: 0 0 25px var(--neon); }

        .footer-social { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        .footer-social a { 
            width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; text-decoration: none;
        }
        .footer-social a:hover { border-color: var(--neon); transform: translateY(-3px); }
        .signature { margin-top: 20px; font-size: 0.8rem; opacity: 0.5; }
        .signature span { color: var(--neon); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-btns">
        <button class="btn-small" onclick="toggleLang()" id="langBtn"><i class="fas fa-language"></i> EN</button>
        <button class="btn-small" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
    </div>

    <h1 class="logo">VibeDown</h1>
    <p class="tagline" id="tag">تحميل مباشر وسريع بجودة أصلية</p>

    <div class="input-area">
        <input type="text" id="url" placeholder="ضع رابط اليوتيوب هنا...">
    </div>

    <button class="main-btn" onclick="startDownload()" id="btnText">تحميل الآن</button>

    <div class="signature">Developed by <span>Osama</span></div>

    <div class="footer-social">
        <a href="https://wa.me/message/FJEGUNCJ4JX7P1" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.instagram.com/osamamasrawy" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/share/18TtS2GVNi/" target="_blank"><i class="fab fa-facebook-f"></i></a>
    </div>
</div>

<script>
    function toggleTheme() {
        const d = document.documentElement;
        const isDark = d.getAttribute('data-theme') !== 'light';
        d.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeBtn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    function toggleLang() {
        const isAr = document.documentElement.getAttribute('lang') !== 'en';
        document.documentElement.setAttribute('lang', isAr ? 'en' : 'ar');
        document.documentElement.setAttribute('dir', isAr ? 'ltr' : 'rtl');
        document.getElementById('langBtn').innerHTML = isAr ? '<i class="fas fa-language"></i> AR' : '<i class="fas fa-language"></i> EN';
        document.getElementById('tag').innerText = isAr ? "Fast & Direct Original Quality Download" : "تحميل مباشر وسريع بجودة أصلية";
        document.getElementById('url').placeholder = isAr ? "Paste link here..." : "ضع رابط اليوتيوب هنا...";
        document.getElementById('btnText').innerText = isAr ? "Download Now" : "تحميل الآن";
    }

    function startDownload() {
        const val = document.getElementById('url').value;
        if(!val) { alert("Please enter a link!"); return; }

        // الطريقة الذهبية: استخدام محرك pcy2mate
        // ده أسرع محرك بيعمل Bypass وبيفتح صفحة التحميل فوراً للفيديو بتاعك
        const finalUrl = "https://www.y2mate.com/youtube/" + extractID(val);
        window.open(finalUrl, '_blank');
    }

    function extractID(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(reg);
        return (match && match[2].length === 11) ? match[2] : "";
    }
</script>
</body>
</html>
